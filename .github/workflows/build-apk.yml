name: Build APK

# 手動觸發即可重新打包 APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Point Bubblewrap at the runner's JDK & SDK
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > signing.keystore

      - name: Bump version code (每次執行遞增，才能覆蓋更新)
        run: |
          node -e "const fs=require('fs');const f='twa-manifest.json';const m=JSON.parse(fs.readFileSync(f));m.appVersionCode=10+Number(process.env.GITHUB_RUN_NUMBER);m.appVersionName='1.'+process.env.GITHUB_RUN_NUMBER;fs.writeFileSync(f,JSON.stringify(m,null,2));console.log('versionCode =',m.appVersionCode)"

      - name: Generate Android project from twa-manifest.json
        run: bubblewrap update --skipVersionUpgrade

      - name: Build signed APK + AAB
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: english-vocab-apk
          path: |
            app-release-signed.apk
            app-release-bundle.aab
          if-no-files-found: error
