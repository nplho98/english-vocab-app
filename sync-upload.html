<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>翻譯同步上傳</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .box { background: #fff; border-radius: 16px; padding: 32px; max-width: 420px; width: 90%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
    h1 { font-size: 20px; color: #0f172a; margin: 0 0 8px; }
    p { font-size: 14px; color: #64748b; margin: 0 0 16px; }
    textarea { width: 100%; height: 160px; border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px; font-size: 12px; font-family: monospace; color: #1e293b; resize: vertical; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
    textarea:focus { border-color: #3b82f6; }
    textarea::placeholder { color: #94a3b8; font-family: system-ui; font-size: 13px; }
    .btns { display: flex; gap: 8px; margin-top: 12px; }
    button { flex: 1; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn-paste { background: #f1f5f9; color: #475569; }
    .btn-upload { background: #3b82f6; color: #fff; }
    button:disabled { background: #cbd5e1; color: #fff; cursor: not-allowed; }
    .msg { margin-top: 14px; font-size: 13px; font-weight: 600; }
    .ok { color: #16a34a; } .err { color: #ef4444; }
  </style>
</head>
<body>
<div class="box">
  <h1>📤 翻譯同步上傳</h1>
  <p>從翻譯工具複製 JSON 後貼入下方，上傳後手機端按「🔄 網路同步」即可更新。</p>
  <textarea id="jsonInput" placeholder="貼上從翻譯工具複製的 JSON 內容…" oninput="onInput()"></textarea>
  <div class="btns">
    <button class="btn-paste" onclick="pasteFromClipboard()">📋 從剪貼簿貼上</button>
    <button class="btn-upload" id="uploadBtn" disabled onclick="upload()">上傳到雲端</button>
  </div>
  <div class="msg" id="msg"></div>
</div>
<script>
  const FIRESTORE = "https://firestore.googleapis.com/v1/projects/english-e754f/databases/(default)/documents/vocab-inbox/sync-export";

  function onInput() {
    const val = document.getElementById("jsonInput").value.trim();
    const btn = document.getElementById("uploadBtn");
    const msg = document.getElementById("msg");
    msg.textContent = "";
    try {
      if (val) JSON.parse(val);
      btn.disabled = !val;
    } catch {
      btn.disabled = true;
      msg.className = "msg err";
      msg.textContent = "格式錯誤，請貼入正確的 JSON。";
    }
  }

  async function pasteFromClipboard() {
    try {
      const text = await navigator.clipboard.readText();
      document.getElementById("jsonInput").value = text;
      onInput();
    } catch {
      document.getElementById("msg").className = "msg err";
      document.getElementById("msg").textContent = "無法讀取剪貼簿，請手動貼上（Ctrl+V）。";
    }
  }

  async function upload() {
    const content = document.getElementById("jsonInput").value.trim();
    if (!content) return;
    const btn = document.getElementById("uploadBtn");
    const msg = document.getElementById("msg");
    btn.disabled = true;
    btn.textContent = "上傳中…";
    msg.textContent = "";
    try {
      const res = await fetch(FIRESTORE, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          fields: {
            data: { stringValue: content },
            updatedAt: { stringValue: new Date().toISOString() }
          }
        })
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      msg.className = "msg ok";
      msg.textContent = "✅ 上傳成功！手機端可以按「網路同步」了。";
      document.getElementById("jsonInput").value = "";
      btn.disabled = true;
    } catch (e) {
      msg.className = "msg err";
      msg.textContent = "❌ 上傳失敗：" + e.message;
    }
    btn.textContent = "上傳到雲端";
  }
</script>
</body>
</html>
